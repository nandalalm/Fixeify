services:
  backend:
    build:
      context: ./Fixeify-Backend
    container_name: fixeify-backend
    restart: unless-stopped
    env_file:
      - ./Fixeify-Backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./Fixeify-Frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
        VITE_DEMO_USER_EMAIL: ${VITE_DEMO_USER_EMAIL:-}
        VITE_DEMO_USER_PASSWORD: ${VITE_DEMO_USER_PASSWORD:-}
        VITE_DEMO_PRO_EMAIL: ${VITE_DEMO_PRO_EMAIL:-}
        VITE_DEMO_PRO_PASSWORD: ${VITE_DEMO_PRO_PASSWORD:-}
    container_name: fixeify-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
